name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image (compiles firmware)
      run: cd Firmware && docker build -t axxpd-builder -f Containerfile .

    - name: Extract build artifacts
      run: |
        docker create --name axxpd-build axxpd-builder
        docker cp axxpd-build:/app/build/AxxPD.elf ./AxxPD.elf
        docker rm axxpd-build

    - name: Report firmware size
      run: |
        docker run --rm axxpd-builder arm-none-eabi-size /app/build/AxxPD.elf

    - name: Upload ELF artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-elf
        path: AxxPD.elf
